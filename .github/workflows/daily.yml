name: 每日游民星空新闻推送
on:
  schedule:
    # 每天下午6点推送（北京时间 UTC+8）
    - cron: '0 10 * * *'
  workflow_dispatch:
jobs:
  send-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: 设置Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: 安装依赖
        run: pip install requests
      
      - name: 运行新闻机器人
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL2 }}
        run: |
          python << 'EOF'
          import requests
          import json
          import time
          from datetime import datetime
          import hashlib
          import os
          WEBHOOK_URL = os.environ['WEBHOOK_URL']
          class GamerskyNewsBot:
              def __init__(self, webhook):
                  self.webhook = webhook
                  self.sent_news = set()
                  
                  # 加载已推送记录
                  try:
                      with open('sent_history.json', 'r') as f:
                          self.sent_news = set(json.load(f))
                  except:
                      pass
              
              def get_news(self):
                  """获取游民星空新闻（过滤手游）"""
                  rss_url = "https://www.gamersky.com/rss/news.xml"
                  
                  block_keywords = [
                      '手游', '王者荣耀', '和平精英', '原神手游', '明日方舟', 
                      '阴阳师', '崩坏', '碧蓝航线', 'FGO', '第五人格',
                      '部落冲突', '皇室战争', '金铲铲', '蛋仔派对'
                  ]
                  
                  try:
                      response = requests.get(rss_url, timeout=10)
                      import xml.etree.ElementTree as ET
                      root = ET.fromstring(response.content)
                      
                      news_list = []
                      items = root.findall('.//item')
                      
                      for item in items[:20]:
                          title = item.find('title').text
                          link = item.find('link').text
                          description = item.find('description').text if item.find('description') is not None else ""
                          pub_date = item.find('pubDate').text if item.find('pubDate') is not None else ""
                          
                          is_mobile_game = False
                          for kw in block_keywords:
                              if kw in title:
                                  is_mobile_game = True
                                  break
                          
                          if is_mobile_game:
                              continue
                          
                          news_id = hashlib.md5(link.encode()).hexdigest()
                          
                          if news_id not in self.sent_news:
                              news_list.append({
                                  'id': news_id,
                                  'title': title,
                                  'link': link,
                                  'summary': description[:150] if description else "",
                                  'pub_date': pub_date
                              })
                      
                      return news_list
                      
                  except Exception as e:
                      print(f"获取新闻失败: {e}")
                      return []
              
              def send_message(self, content, msg_type="markdown"):
                  """发送到企业微信"""
                  if msg_type == "markdown":
                      data = {
                          "msgtype": "markdown",
                          "markdown": {
                              "content": content
                          }
                      }
                  else:
                      data = {
                          "msgtype": "text",
                          "text": {
                              "content": content
                          }
                      }
                  
                  try:
                      response = requests.post(self.webhook, json=data, timeout=10)
                      return response.status_code == 200
                  except Exception as e:
                      print(f"发送失败: {e}")
                      return False
              
              def format_news(self, news_list):
                  """格式化新闻为Markdown"""
                  if not news_list:
                      return None
                  
                  today = datetime.now().strftime('%Y年%m月%d日')
                  
                  msg = f"## 🎮 游民星空新闻速递\n📅 {today}\n"
                  
                  for i, news in enumerate(news_list[:10], 1):
                      msg += f"### {i}. {news['title']}\n📝 {news['summary'][:80]}...\n🔗 [阅读全文]({news['link']})\n---\n"
                  
                  msg += "\n> 💡 每日自动推送，已过滤手游内容"
                  
                  return msg
              
              def save_sent(self, news_list):
                  """保存已推送记录"""
                  for news in news_list:
                      self.sent_news.add(news['id'])
                  
                  if len(self.sent_news) > 500:
                      self.sent_news = set(list(self.sent_news)[-500:])
                  
                  with open('sent_history.json', 'w') as f:
                      json.dump(list(self.sent_news), f)
              
              def run(self):
                  """执行推送"""
                  print(f"[{datetime.now()}] 开始获取新闻...")
                  
                  news_list = self.get_news()
                  
                  if not news_list:
                      print("没有新新闻")
                      return
                  
                  print(f"发现 {len(news_list)} 条新新闻")
                  
                  message = self.format_news(news_list)
                  if message:
                      if self.send_message(message):
                          self.save_sent(news_list)
                          print(f"推送成功！共 {len(news_list)} 条")
                      else:
                          print("推送失败")
          if __name__ == "__main__":
              bot = GamerskyNewsBot(WEBHOOK_URL)
              bot.run()
          EOF
      
      - name: 保存推送记录
        uses: actions/upload-artifact@v3
        with:
          name: sent-history
          path: sent_history.json
          retention-days: 30
