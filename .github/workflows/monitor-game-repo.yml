name: Monitor Game Repo Changes

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Cache last commit
      uses: actions/cache@v3
      with:
        path: monitor/last_commit.txt
        key: last-commit-${{ github.run_id }}
        restore-keys: last-commit-
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: pip install requests
    
    - name: Check and notify
      env:
        WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
      run: python monitor/check_changes.py
